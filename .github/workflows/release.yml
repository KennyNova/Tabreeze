name: Build & Release

on:
  push:
    branches:
      - main

# Required for softprops/action-gh-release to create tags/releases (default token is often read-only).
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -r ../tabreeze.zip .
          cd ..

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Build ${{ steps.sha.outputs.short }}"
          body: "Automated build from commit ${{ github.sha }}."
          files: tabreeze.zip
