<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<h3>Right-click each icon below and "Save image as..." to create your extension icons.</h3>
<p>Save them to <code>public/icons/</code> as <code>icon16.png</code>, <code>icon48.png</code>, and <code>icon128.png</code>.</p>
<canvas id="c16" width="16" height="16"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.15;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#3B82F6');
  grad.addColorStop(1, '#8B5CF6');

  // Rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  const pad = s * 0.25;
  const gap = (s - 2 * pad) / 2;
  const dotR = s * 0.08;
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      ctx.beginPath();
      ctx.arc(pad + col * gap, pad + row * gap, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

drawIcon(document.getElementById('c16'));
drawIcon(document.getElementById('c48'));
drawIcon(document.getElementById('c128'));
</script>
</body>
</html>
